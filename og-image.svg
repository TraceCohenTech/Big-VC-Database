<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#238636"/>
      <stop offset="100%" style="stop-color:#3fb950"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative elements -->
  <circle cx="1100" cy="100" r="200" fill="#58a6ff" opacity="0.05"/>
  <circle cx="100" cy="530" r="150" fill="#3fb950" opacity="0.05"/>

  <!-- Grid lines -->
  <line x1="0" y1="200" x2="1200" y2="200" stroke="#30363d" stroke-width="1" opacity="0.3"/>
  <line x1="0" y1="430" x2="1200" y2="430" stroke="#30363d" stroke-width="1" opacity="0.3"/>

  <!-- Main title -->
  <text x="100" y="220" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="90" font-weight="800" fill="#ffffff">VC</text>
  <text x="240" y="220" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="90" font-weight="800" fill="url(#blueGrad)">Universe</text>

  <!-- Subtitle -->
  <text x="100" y="290" font-family="system-ui, -apple-system, BlinkMacSystemFont, sans-serif" font-size="36" fill="#8b949e">The Definitive VC Database</text>

  <!-- Stats boxes -->
  <rect x="100" y="340" width="280" height="100" rx="12" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
  <text x="240" y="385" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#ffffff" text-anchor="middle">1,000+</text>
  <text x="240" y="420" font-family="system-ui, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">Verified VCs</text>

  <rect x="410" y="340" width="220" height="100" rx="12" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
  <text x="520" y="385" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#58a6ff" text-anchor="middle">USA</text>
  <text x="520" y="420" font-family="system-ui, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">Israel &amp; Global</text>

  <rect x="660" y="340" width="220" height="100" rx="12" fill="#1f2937" stroke="#30363d" stroke-width="1"/>
  <text x="770" y="385" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="#3fb950" text-anchor="middle">Free</text>
  <text x="770" y="420" font-family="system-ui, sans-serif" font-size="18" fill="#8b949e" text-anchor="middle">Open Access</text>

  <!-- Tags -->
  <rect x="100" y="480" width="140" height="40" rx="20" fill="rgba(88,166,255,0.15)"/>
  <text x="170" y="507" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#58a6ff" text-anchor="middle">Pre-Seed</text>

  <rect x="260" y="480" width="100" height="40" rx="20" fill="rgba(88,166,255,0.15)"/>
  <text x="310" y="507" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#58a6ff" text-anchor="middle">Seed</text>

  <rect x="380" y="480" width="120" height="40" rx="20" fill="rgba(88,166,255,0.15)"/>
  <text x="440" y="507" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#58a6ff" text-anchor="middle">Series A</text>

  <rect x="520" y="480" width="120" height="40" rx="20" fill="rgba(63,185,80,0.15)"/>
  <text x="580" y="507" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#3fb950" text-anchor="middle">Fintech</text>

  <rect x="660" y="480" width="70" height="40" rx="20" fill="rgba(63,185,80,0.15)"/>
  <text x="695" y="507" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#3fb950" text-anchor="middle">AI</text>

  <rect x="750" y="480" width="130" height="40" rx="20" fill="rgba(63,185,80,0.15)"/>
  <text x="815" y="507" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#3fb950" text-anchor="middle">Healthcare</text>

  <!-- URL -->
  <text x="100" y="590" font-family="system-ui, sans-serif" font-size="24" fill="#484f58">bigvc-list.vercel.app</text>
</svg>
